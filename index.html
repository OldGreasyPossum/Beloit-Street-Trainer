<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Beloit Street Trainer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; touch-action: none; }
canvas { display: block; }

#status {
  position: fixed; top: 10px; left: 10px;
  color: yellow; font: bold 15px/1.4 Arial, sans-serif;
  text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
  pointer-events: none;
  max-width: calc(100vw - 200px);
}

#controls {
  position: fixed; top: 10px; right: 10px;
  display: flex; flex-direction: column; gap: 8px;
}
#controls button {
  padding: 12px 18px; font: bold 15px Arial, sans-serif;
  border: none; border-radius: 5px; cursor: pointer;
  min-width: 80px; touch-action: manipulation;
}
#hintBtn { background: purple; color: #fff; }
#skipBtn { background: #555;   color: #fff; }

#msg {
  position: fixed; top: 58px; left: 50%; transform: translateX(-50%);
  font: bold 22px Arial, sans-serif; white-space: nowrap;
  text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
  pointer-events: none;
}

@media (max-width: 600px) {
  #status { font-size: 13px; }
  #controls button { padding: 14px 14px; font-size: 14px; min-width: 70px; }
  #msg { font-size: 18px; top: 52px; }
}
</style>
</head>
<body>
<canvas id="map"></canvas>
<div id="status">Loading map…</div>
<div id="controls">
  <button id="hintBtn">HINT</button>
  <button id="skipBtn">SKIP</button>
</div>
<div id="msg"></div>

<script>
'use strict';

// ── Config ─────────────────────────────────────────────────────────────
const IMG_W = 3000, IMG_H = 1561;
const HOVER_DIST = 30;   // image-pixel hit radius (same as Python version)

const LANDMARK_NAMES = new Set([
  'Cranston Road','Cranston Rd',
  'Liberty Avenue','Liberty Ave','Liberty',
  'East Liberty Avenue','East Liberty Ave','East Liberty',
  '6th Street','6th St',
  'South Afton Road','S Afton Road','South Afton Rd','S Afton Rd',
  'Milwaukee Road','Milwaukee Rd',
  'White Avenue','White Ave',
  'Prairie Avenue','Prairie Ave',
  'County Road G','County G','Highway G','State Highway G',
]);

// ── DOM ────────────────────────────────────────────────────────────────
const canvas    = document.getElementById('map');
const ctx       = canvas.getContext('2d');
const statusDiv = document.getElementById('status');
const msgDiv    = document.getElementById('msg');

document.getElementById('hintBtn').addEventListener('click', useHint);
document.getElementById('skipBtn').addEventListener('click', skipStreet);

// ── State ──────────────────────────────────────────────────────────────
let streets = [], streetNames = [];
let mapImg  = null, ready = false;

let scale = 1, minScale = 1, maxScale = 6;
let offX = 0, offY = 0;

let score = 0, best = 0, correct = 0;
let target = null, hover = null;
let hintUsed = false, hintNames = [];
let correctHL = null, wrongHL = null;
let msgText = '', msgColor = 'limegreen';

let blinkTimer = null, blinkOn = true, blinkIsBlink = false;
let clearTimer = null;

// ── Startup ────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (ready) render();
}
window.addEventListener('resize', resize);
resize();

const imgReady  = new Promise(res => {
  const img = new Image();
  img.onload = () => { mapImg = img; res(); };
  img.src = 'beloit_map.png';
});
const dataReady = fetch('streets.json').then(r => r.json());

Promise.all([imgReady, dataReady]).then(([, data]) => {
  streets     = data;
  streetNames = [...new Set(streets.map(s => s.n))].sort();
  ready       = true;

  const sx = canvas.width  / IMG_W;
  const sy = canvas.height / IMG_H;
  minScale = Math.min(sx, sy);
  scale    = minScale * 2;
  offX     = (canvas.width  - IMG_W * scale) / 2;
  offY     = (canvas.height - IMG_H * scale) / 2;

  pickTarget();
  render();
}).catch(err => {
  statusDiv.textContent = 'Error loading data: ' + err.message;
});

// ── Coords ─────────────────────────────────────────────────────────────
function i2s(ix, iy) { return [ix * scale + offX, iy * scale + offY]; }
function s2i(sx, sy) { return [(sx - offX) / scale, (sy - offY) / scale]; }

// ── Hit detection ──────────────────────────────────────────────────────
function distSeg(px, py, x1, y1, x2, y2) {
  const vx = x2-x1, vy = y2-y1;
  const lenSq = vx*vx + vy*vy;
  if (!lenSq) return Math.hypot(px-x1, py-y1);
  const t = Math.max(0, Math.min(1, ((px-x1)*vx + (py-y1)*vy) / lenSq));
  return Math.hypot(px - (x1 + t*vx), py - (y1 + t*vy));
}

function streetAt(sx, sy) {
  const [ix, iy] = s2i(sx, sy);
  let best = null, bestD = HOVER_DIST;
  for (const s of streets) {
    const d = distSeg(ix, iy, s.x1, s.y1, s.x2, s.y2);
    if (d < bestD) { bestD = d; best = s; }
  }
  return best;
}

// ── Drawing ────────────────────────────────────────────────────────────
function drawGroup(names, color, width) {
  const set = new Set(Array.isArray(names) ? names : [names]);
  ctx.strokeStyle = color;
  ctx.lineWidth   = width;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  for (const s of streets) {
    if (!set.has(s.n)) continue;
    const [x1, y1] = i2s(s.x1, s.y1);
    const [x2, y2] = i2s(s.x2, s.y2);
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  }
  ctx.stroke();
}

function render() {
  if (!ready) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Base map
  ctx.drawImage(mapImg, offX, offY, IMG_W * scale, IMG_H * scale);

  // Landmark roads (always lime green)
  drawGroup([...LANDMARK_NAMES], 'limegreen', 5);

  // Hint choices (purple)
  if (hintNames.length) drawGroup(hintNames, 'purple', 4);

  // Wrong answer (red)
  if (wrongHL) drawGroup(wrongHL, 'red', 7);

  // Correct street — purple while blinking after a wrong answer, then blue
  if (correctHL && blinkOn) drawGroup(correctHL, blinkIsBlink ? 'purple' : 'blue', 9);

  // Hover highlight (yellow) — desktop only, only when no active result
  if (hover && !correctHL && !wrongHL) drawGroup(hover, 'yellow', 6);

  // Status bar
  const findStr = target ?? '…';
  statusDiv.textContent =
    `Find: ${findStr}  |  Score: ${score.toFixed(2)}  |  Best: ${best.toFixed(2)}  |  Correct: ${correct}`;

  msgDiv.style.color = msgColor;
  msgDiv.textContent = msgText;
}

// ── Quiz ───────────────────────────────────────────────────────────────
function pickTarget() {
  const pool = streetNames.filter(n => n !== target);
  target = pool.length ? pool[Math.floor(Math.random() * pool.length)] : streetNames[0];
}

function handleTap(sx, sy) {
  if (!ready) return;
  cancelBlink();
  cancelClear();
  const wasHintUsed = hintUsed;
  correctHL = null; wrongHL = null; hintNames = []; hintUsed = false; msgText = '';

  const s = streetAt(sx, sy);
  if (!s) { render(); return; }

  if (s.n === target) {
    score += wasHintUsed ? 0.25 : 1;
    if (score > best) best = score;
    correct++;
    msgText  = `Correct!  ${s.n}${wasHintUsed ? '  (hint)' : ''}`;
    msgColor = 'limegreen';
    correctHL = s.n;
    blinkIsBlink = false;
    pickTarget();
    scheduleClear(4000);
    render();
  } else {
    const prev = target;
    score    = 0;
    msgText  = `Wrong!  You clicked: ${s.n}`;
    msgColor = 'red';
    wrongHL  = s.n;
    correctHL = prev;
    pickTarget();
    startBlink();
    scheduleClear(4500);
    render();
  }
}

function useHint() {
  if (!target || !ready) return;
  hintUsed = true;
  const others = streetNames.filter(n => n !== target);
  shuffle(others);
  hintNames = shuffle([target, ...others.slice(0, 3)]);
  render();
}

function skipStreet() {
  if (!ready) return;
  cancelBlink(); cancelClear();
  correctHL = null; wrongHL = null; hintNames = []; hintUsed = false; msgText = '';
  pickTarget();
  render();
}

// ── Blink ──────────────────────────────────────────────────────────────
function startBlink() {
  let n = 12; blinkOn = true; blinkIsBlink = true;
  blinkTimer = setInterval(() => {
    blinkOn = !blinkOn; render();
    if (--n <= 0) {
      cancelBlink();
      blinkOn = true; blinkIsBlink = false;
      render();
    }
  }, 200);
}
function cancelBlink() {
  if (blinkTimer) { clearInterval(blinkTimer); blinkTimer = null; }
  blinkOn = true;
}
function scheduleClear(ms) {
  cancelClear();
  clearTimer = setTimeout(() => {
    correctHL = null; wrongHL = null; hintNames = []; msgText = '';
    render();
  }, ms);
}
function cancelClear() {
  if (clearTimer) { clearTimeout(clearTimer); clearTimer = null; }
}

// ── Mouse ──────────────────────────────────────────────────────────────
let mDown = false, mStartX = 0, mStartY = 0, mCurX = 0, mCurY = 0;

canvas.addEventListener('mousedown', e => {
  mDown = true;
  mStartX = mCurX = e.clientX;
  mStartY = mCurY = e.clientY;
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (mDown) {
    offX += e.clientX - mCurX;
    offY += e.clientY - mCurY;
    mCurX = e.clientX; mCurY = e.clientY;
    render();
  }
  const s = streetAt(e.clientX, e.clientY);
  const name = s ? s.n : null;
  if (name !== hover) { hover = name; render(); }
});
window.addEventListener('mouseup', e => {
  if (!mDown) return;
  const moved = Math.hypot(e.clientX - mStartX, e.clientY - mStartY) > 5;
  mDown = false;
  if (!moved && e.button === 0) handleTap(e.clientX, e.clientY);
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f  = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  const ns = Math.max(minScale, Math.min(maxScale, scale * f));
  offX  = e.clientX - (e.clientX - offX) * (ns / scale);
  offY  = e.clientY - (e.clientY - offY) * (ns / scale);
  scale = ns;
  render();
}, { passive: false });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ── Touch ──────────────────────────────────────────────────────────────
let tStartX = 0, tStartY = 0, tCurX = 0, tCurY = 0;
let tMoved = false, pinchDist = null, twoFingers = false;
const TAP_DIST = 10;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  tMoved = false; twoFingers = e.touches.length > 1;
  if (e.touches.length === 1) {
    tStartX = tCurX = e.touches[0].clientX;
    tStartY = tCurY = e.touches[0].clientY;
    pinchDist = null;
  } else if (e.touches.length === 2) {
    pinchDist = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY
    );
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && !twoFingers) {
    const dx = e.touches[0].clientX - tCurX;
    const dy = e.touches[0].clientY - tCurY;
    if (Math.abs(e.touches[0].clientX - tStartX) > TAP_DIST ||
        Math.abs(e.touches[0].clientY - tStartY) > TAP_DIST) tMoved = true;
    offX += dx; offY += dy;
    tCurX = e.touches[0].clientX; tCurY = e.touches[0].clientY;
    render();
  } else if (e.touches.length === 2) {
    tMoved = true;
    const dist = Math.hypot(
      e.touches[1].clientX - e.touches[0].clientX,
      e.touches[1].clientY - e.touches[0].clientY
    );
    if (pinchDist) {
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const ns   = Math.max(minScale, Math.min(maxScale, scale * dist / pinchDist));
      offX  = midX - (midX - offX) * (ns / scale);
      offY  = midY - (midY - offY) * (ns / scale);
      scale = ns;
      render();
    }
    pinchDist = dist;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) {
    if (!tMoved && !twoFingers) handleTap(tCurX, tCurY);
    pinchDist = null; twoFingers = false;
  } else if (e.touches.length === 1) {
    pinchDist = null; twoFingers = false;
    tCurX = e.touches[0].clientX; tCurY = e.touches[0].clientY;
  }
}, { passive: false });

// ── Arrow keys ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const step = 50;
  if      (e.key === 'ArrowLeft')  offX += step;
  else if (e.key === 'ArrowRight') offX -= step;
  else if (e.key === 'ArrowUp')    offY += step;
  else if (e.key === 'ArrowDown')  offY -= step;
  else return;
  e.preventDefault();
  render();
});

// ── Utils ──────────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
</script>
</body>
</html>
